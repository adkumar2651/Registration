<!DOCTYPE html>
<html>
<head>
<title>Future India Registration Form</title>

<style>
h1,h2{
text-align:center;
}

/* Form Box */
.form-box{
width:350px;
margin:auto;
border:4px solid black;   /* thick + dark border */
padding:20px;
border-radius:10px;
background-color:rgba(0,0,0,0.3);
}
</style>

</head>

<body style="background-color:rgb(221,12,113); color:rgb(255, 255, 0);">

<h1>Future India Innovation Program</h1>
<h2>Registration Form</h2>

<div class="form-box">

<form style="text-align:center;">

Name:<br>
<input type="text" name="name"><br><br>

Email:<br>
<input type="email" name="email"><br><br>

Phone Number:<br>
<input type="number" name="phone"><br><br>

Gender:<br>
<input type="radio" name="gender"> Male
<input type="radio" name="gender"> Female
<input type="radio" name="gender"> Other<br><br>

Area of Interest:<br>
<input type="checkbox"> Renewable Energy<br>
<input type="checkbox"> Space Research<br>
<input type="checkbox"> Smart Cities<br>
<input type="checkbox"> Technology<br><br>

City:<br>
<select>
<option></option>   
<option>Delhi</option>
<option>Mumbai</option>
<option>Bangalore</option>
<option>Hyderabad</option>
</select><br><br>

Message / Ideas for Future India:<br>
<textarea rows="4" cols="30"></textarea><br><br>

<input type="submit" value="Register">
<input type="reset" value="Clear Form">

</form>

</div>

<br><br>

<div style="text-align:center;">
<a href="index.html" style="text-decoration:none;">
<button type="button">Back to Home</button>
</a>
</div>

</body>
</html>
